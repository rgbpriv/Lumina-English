<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina IELTS Flyer - High Legibility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Playfair+Display:wght@900&display=swap');

        body {
            background-color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #000;
            margin: 0;
            padding: 0;
        }

        /* A4 Paper Dimensions */
        .a4-page {
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            margin: auto;
            border: 1px solid #eee;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .serif { font-family: 'Playfair Display', serif; }

        @media print {
            .a4-page {
                margin: 0;
                border: none;
                width: 210mm;
                height: 297mm;
                padding: 20mm;
            }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="">

    <div class="no-print max-w-7xl mx-auto my-6 px-4 text-right">
        <button onclick="window.print()" class="bg-black text-white px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-gray-800 transition shadow-xl">Print Flyer</button>
    </div>

    <!-- A4 Container -->
    <div class="a4-page bg-white">
        
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="w-14 h-14 bg-black flex items-center justify-center rounded-2xl">
                    <span class="text-white font-extrabold text-3xl">L</span>
                </div>
                <span class="text-4xl font-black tracking-tighter">LUMINA</span>
            </div>
            <div class="text-right">
                <p class="text-xs font-extrabold uppercase tracking-widest">Dhaka Campus</p>
                <p class="text-xs font-bold uppercase tracking-widest text-gray-400">Pre-Enrollment</p>
            </div>
        </div>

        <!-- Major Heading -->
        <div class="mt-8">
            <h1 class="serif text-[108px] leading-[0.9] font-black uppercase">
                IELTS<br>SCORE<br>
                <span class="inline-block bg-black text-white px-6 py-2 leading-none">8.5</span>
            </h1>
            <p class="text-3xl font-extrabold tracking-tighter mt-12 border-l-8 border-black pl-6 uppercase">
                Best IELTS Preparation<br>for Global Graduates.
            </p>
        </div>

        <!-- Centered Contact Number -->
        <div class="block my-auto text-center h-auto">
            <p class="text-xs font-black uppercase tracking-[0.4em] mb-4 mt-16">Enroll via WhatsApp or Phone</p>
            <div class="border-[6px] border-black p-8 flex items-center justify-center space-x-6 transform rotate-1 hover:rotate-0 transition duration-300">
                <!-- WhatsApp SVG Logo -->
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-black">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    <path d="M14.5 2s.5 0 2.5 2 2 2.5 2 2.5"></path>
                    <path d="M12.5 2c3 0 7.5 4.5 7.5 7.5"></path>
                </svg>
                <span class="text-6xl font-black tracking-tighter">01325319541</span>
            </div>
            <div class="mt-8 flex justify-center space-x-6 text-[10px] font-black uppercase tracking-widest">
                <span>LISTENING</span>
                <span class="text-gray-300">•</span>
                <span>READING</span>
                <span class="text-gray-300">•</span>
                <span>WRITING</span>
                <span class="text-gray-300">•</span>
                <span>SPEAKING</span>
            </div>
            <p class="text-xl font-extrabold tracking-tighter mt-12 pl-6 uppercase">
                Limited Seats Available.
            </p>
        </div>

        <!-- Footer / QR -->
        <div class="mt-auto flex justify-between items-end border-t-2 border-black pt-6">
            <div>
                <p class="text-xl font-black leading-tight uppercase">Registration Deadline</p>
                <p class="text-lg font-black leading-tight uppercase">15th April 2026</p>
                <!-- <p class="text-[10px] font-bold uppercase tracking-widest mt-1 text-gray-400">15th April 2026</p> -->
            </div>
            <div class="flex flex-col items-end">
                <div class="w-24 h-24 bg-gray-300 flex items-center justify-center">
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-500">
                        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOsAAADrAQMAAACyxPOWAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAGUExURQAAAP///6XZn90AAAAJcEhZcwAADsMAAA7DAcdvqGQAAAJOSURBVFjD5dixbtswEAbgIzhwK5UpGozyUfRo8aP5URh48NZqKAINgq/kkZKdBPhp9KrabbkE0ac7MQxJHUVLG6LjM73w6Gbifb1o/l9+4dwSl7vkt32QH4cGB8w9ZsLsVc+mrbuWrhterhM54THdWrp2L9Z1jVR8lbzMtYOf7B9iUkX7x+ga82zq0ly5w/yEOdyRd5ipnbwuwTLXhrHMtU8r9Bc4bMm6Z/tm8st+nkdteLef69hjNpiDinVdc63kvDRhLm/BpU2YI+bvmFnFG3ctL0F7zv8dnmktDgJPaVnmhjiooj3mnSp5g58xd62/O80rvwyqTE65K+ZrNJxUPGKOd2RucRqaMY9arZmEZcrlkBFzxDypojfl+aael8Vs89s/10x5TpVdCXMjetwy+QlzxHxURUcpBGRQ0w0rpxCXl2WP2WB2mD1mi5kwB9WzSV5ptixBOc2lwZP9Ls+1Q4Mt5h7zF8wBs1H13Km4k72bywBSLg5Y1kYZVNnXAMfHjf6G+Yh5kkpTqoIoJebwYVAhhy3ZqqI71R9m6u5ULshxTfb4tUEOquhOldxhtph7zDcMS21yqNtf3oJnOcVCDpiNKrrRNYvZYd5h7tfhGdbBk1JyeRtAJhU/cHLTjL76/CYbV9qsuJRUTf6K2amS71TRDe4w26svJpMcT9YlaEoBjnhWRUfMJ8yvquR8c/Kyn5PPlS3Jh6TlmPoPsvl9yctprnItTCD/UEVvym/q5HUJ5qpgaWVnYv57+W3jZ9d2+fx2dTGomO7IRhNN9BN/VMGQp070VgAAAABJRU5ErkJggg==" alt="QR Code">
                    </span>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
