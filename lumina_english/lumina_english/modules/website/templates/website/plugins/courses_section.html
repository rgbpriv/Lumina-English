{% load cms_tags %}
<section id="courses" class="py-24 px-6 max-w-7xl mx-auto {{ instance.css_classes }}">
    <div class="text-center mb-16">
        <h2 class="serif-font text-4xl text-gray-900">{{ instance.title }}</h2>
        <p class="text-gray-500 mt-4">{{ instance.intro|safe }}</p>
    </div>

    <div class="grid md:grid-cols-3 gap-8" id="course-list-{{ instance.pk }}">
        {% for child in instance.get_children %}
            {% render_plugin child %}
        {% endfor %}
    </div>
</section>
