{% load static frontend %}
<section id="home" class="hero-gradient min-h-screen flex items-center pt-20 px-6 overflow-hidden relative {{ instance.css_classes }}">
    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
        <div class="text-white z-10">
            {% if instance.eyebrow %}
                <span class="inline-block px-4 py-1 border border-white/30 rounded-full text-[10px] font-bold tracking-widest mb-6 uppercase bg-white/5">{{ instance.eyebrow }}</span>
            {% endif %}
            <h1 class="serif-font text-5xl md:text-7xl leading-tight mb-8">{% inline_field instance "heading" %}</h1>
            <p class="text-lg text-gray-200 mb-10 max-w-lg leading-relaxed">{{ instance.subheading|safe }}</p>
            <div class="flex flex-col sm:flex-row gap-4">
                <a href="{{ instance.cta_link }}" class="bg-white text-royal-red px-8 py-4 rounded-2xl font-bold text-lg hover:bg-gray-100 transition shadow-2xl">{{ instance.cta_text }}</a>
            </div>
        </div>
        {% if instance.image_url %}
        <div class="hidden md:block relative">
            <div class="absolute inset-0 bg-white/5 blur-3xl rounded-full"></div>
            <img src="{{ instance.image_url }}" alt="Hero Image" class="rounded-[40px] shadow-2xl border-8 border-white/10 relative z-10 transform -rotate-2">
        </div>
        {% endif %}
    </div>
</section>
